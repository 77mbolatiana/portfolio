<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MBOLATIANA Herilantosoa Claude Adele - Portfolio</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      header {
        background-color: #111;
        padding: 15px 40px;
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        color: white;
        font-size: 20px;
        font-weight: bold;
      }

      .nav-links {
        list-style: none;
        display: flex;
        gap: 25px;
        margin: 0;
        padding: 0;
      }

      .nav-links li a {
        text-decoration: none;
        color: white;
        font-weight: 500;
        transition: 0.3s;
      }

      .nav-links li a:hover {
        color: #00bcd4;
      }

      .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 80px 40px;
        min-height: 90vh;
        background: #f5f5f5;
    }

    .hero-left {
        max-width: 50%;
    }

    .hero-left p {
        font-size: 16px;
        color: #555;
        margin-bottom: 10px;
    }

    .hero-left h1 {
        font-size: 60px;
        margin: 10px 0;
        color: #111;
    }

    .hero-left span {
        color: #00bcd4;
    }

    .hero-right img {
        width: 400px;
        height: auto;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    @media (max-width: 900px) {
        .hero {
            flex-direction: column;
            text-align: center;
        }

        .hero-left {
            max-width: 100%;
        }

        .hero-right img {
            width: 300px;
            margin-top: 30px;
        }
    }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">Claude Adele</div>
        <ul class="nav-links">
          <li><a href="#home">Accueil</a></li>
          <li><a href="#about">À propos</a></li>
          <li><a href="#skills">Compétences</a></li>
          <li><a href="#projects">Projets</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero" id="home">
        <div class="hero-left">
          <p>
            MBOLATIANA Herilantosoa Claude Adele <br />
            +261382310436 <br />
            mbolatianaherilantosoa@gmail.com <br />
            Fianarantsoa
          </p>

          <h1><span>Développeur</span> Web</h1>
        </div>

        <div class="hero-right">
          <img src="photo.jpeg" alt="Photo de Claude Adele" />
        </div>
      </section>
    </main>
  </body>
</html>
